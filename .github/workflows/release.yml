name: Release App Installers

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  package:
    name: Build redistributable app artifacts
    runs-on: macos-latest

    steps:
      - name: Check out release source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Validate package inputs
        run: |
          bash -n package_redistributable.sh
          bash -n package_installer.sh
          bash -n macos/pkg-scripts/postinstall
          bash -n "INSTALL - Local Meeting Note Taker.command"
          bash -n "OPEN ME - Local Meeting Note Taker.command"
          bash -n "Local Meeting Note Taker.app/Contents/MacOS/LocalMeetingNoteTaker"
          bash -n "local-meeting-note-taker/Local Meeting Note Taker.app/Contents/MacOS/LocalMeetingNoteTaker"
          bash -n local-meeting-note-taker/*.sh
          bash -n local-meeting-note-taker/*.command
          python3 -m py_compile local-meeting-note-taker/app.py local-meeting-note-taker/launcher.py
          ! grep -F "pywebview" local-meeting-note-taker/requirements.txt
          grep -F "@app.post(\"/native/start\")" local-meeting-note-taker/app.py
          grep -F "@app.post(\"/native/stop\")" local-meeting-note-taker/app.py
          test -f macos/LocalMeetingNoteTaker.icns
          file macos/LocalMeetingNoteTaker.icns | grep -F "Mac OS X icon"
          plutil -lint "Local Meeting Note Taker.app/Contents/Info.plist"
          plutil -lint "local-meeting-note-taker/Local Meeting Note Taker.app/Contents/Info.plist"

      - name: Build redistributable zip
        run: ./package_redistributable.sh

      - name: Verify redistributable zip
        run: |
          test -f LocalMeetingNoteTaker-redistributable.zip
          file ".package-work/Local Meeting Note Taker.app/Contents/MacOS/LocalMeetingNoteTaker" | grep -F "Mach-O"
          lipo -info ".package-work/Local Meeting Note Taker.app/Contents/MacOS/LocalMeetingNoteTaker"
          otool -L ".package-work/Local Meeting Note Taker.app/Contents/MacOS/LocalMeetingNoteTaker" | grep -F "WebKit.framework"
          test -f ".package-work/Local Meeting Note Taker.app/Contents/Resources/LocalMeetingNoteTaker.icns"
          unzip -l LocalMeetingNoteTaker-redistributable.zip
          unzip -l LocalMeetingNoteTaker-redistributable.zip | grep -F "Local Meeting Note Taker.app/Contents/Resources/LocalMeetingNoteTaker.icns"
          unzip -l LocalMeetingNoteTaker-redistributable.zip | grep -F "Local Meeting Note Taker.app/Contents/Resources/local-meeting-note-taker/app.py"
          unzip -l LocalMeetingNoteTaker-redistributable.zip | grep -F "Local Meeting Note Taker.app/Contents/Resources/local-meeting-note-taker/launch_app.sh"
          unzip -p LocalMeetingNoteTaker-redistributable.zip "Local Meeting Note Taker.app/Contents/Resources/local-meeting-note-taker/requirements.txt" | ( ! grep -F "pywebview" )
          unzip -p LocalMeetingNoteTaker-redistributable.zip "Local Meeting Note Taker.app/Contents/Resources/local-meeting-note-taker/app.py" | grep -F '@app.post("/native/start")'
          unzip -p LocalMeetingNoteTaker-redistributable.zip "Local Meeting Note Taker.app/Contents/Resources/local-meeting-note-taker/app.py" | grep -F '@app.post("/native/stop")'
          ! unzip -l LocalMeetingNoteTaker-redistributable.zip | grep -F "Local Meeting Note Taker/local-meeting-note-taker/"
          ! unzip -l LocalMeetingNoteTaker-redistributable.zip | grep -E '(^|/)(\.git|\.github|\.venv|__pycache__|\.package-work|__MACOSX)(/|$)'
          ! unzip -l LocalMeetingNoteTaker-redistributable.zip | grep -E 'data/(uploads|notes|results|logs|native-recordings)/.+'

      - name: Build installer package
        run: LMNT_USE_EXISTING_APP=1 ./package_installer.sh

      - name: Verify installer package
        run: |
          test -f LocalMeetingNoteTaker-installer.pkg
          pkgutil --payload-files LocalMeetingNoteTaker-installer.pkg | grep -F "Applications/Local Meeting Note Taker.app/Contents/MacOS/LocalMeetingNoteTaker"
          pkgutil --payload-files LocalMeetingNoteTaker-installer.pkg | grep -F "Applications/Local Meeting Note Taker.app/Contents/Resources/LocalMeetingNoteTaker.icns"
          pkgutil --payload-files LocalMeetingNoteTaker-installer.pkg | grep -F "Applications/Local Meeting Note Taker.app/Contents/Resources/local-meeting-note-taker/app.py"
          rm -rf /tmp/lmnt-pkg-expanded
          pkgutil --expand LocalMeetingNoteTaker-installer.pkg /tmp/lmnt-pkg-expanded
          grep -F "./install_requirements.sh" /tmp/lmnt-pkg-expanded/Scripts/postinstall
          grep -F "./check_ready.sh" /tmp/lmnt-pkg-expanded/Scripts/postinstall

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            LocalMeetingNoteTaker-redistributable.zip \
            LocalMeetingNoteTaker-installer.pkg \
            --clobber
